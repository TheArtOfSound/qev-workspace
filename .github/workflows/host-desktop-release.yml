name: Build QEV Host Mac Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "host-v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - run: pnpm install --frozen-lockfile=false

      - name: Build QEV Host DMG
        working-directory: apps/host-desktop
        run: pnpm exec tauri build --bundles dmg

      - name: Stage DMG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find apps/host-desktop/src-tauri/target/release/bundle/dmg -name "*.dmg" -print
          cp apps/host-desktop/src-tauri/target/release/bundle/dmg/*.dmg release-assets/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          NOTES=$(cat <<'NOTES'
Download QEV Host on the Mac you want to control.

Preview build notes:
- This is a macOS DMG installer.
- This preview build is not code-signed/notarized yet, so macOS may show a security warning.
- Open QEV Host once, enable launch at login, and grant Screen Recording + Accessibility permissions.
NOTES
          )

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --title "QEV Host $TAG_NAME" \
              --notes "$NOTES" \
              --prerelease
          fi
